<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, viewport-fit=cover" />
  <style>
    /* 首屏 Loading：在 Vue 应用挂载前展示，挂载后由 #app 内容替换自动移除 */
    .de-first-loading {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background-color: #020429;
      color: #ffffff;
      z-index: 9999;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC',
        'Hiragino Sans GB', 'Microsoft YaHei', Arial, sans-serif;
    }
    .de-first-loading__spinner {
      width: 44px;
      height: 44px;
      border: 4px solid rgba(255, 255, 255, 0.25);
      border-top-color: #ffffff;
      border-radius: 50%;
      animation: de-first-loading-spin 0.8s linear infinite;
    }
    .de-first-loading__text {
      margin-top: 20px;
      font-size: 14px;
      letter-spacing: 2px;
      opacity: 0.9;
    }
    @keyframes de-first-loading-spin {
      to {
        transform: rotate(360deg);
      }
    }
    @media (prefers-reduced-motion: reduce) {
      .de-first-loading__spinner {
        animation-duration: 2.5s;
      }
    }
  </style>
</head>

<body>
  <div id="app">
    <div class="de-first-loading">
      <div class="de-first-loading__spinner"></div>
      <div class="de-first-loading__text">加载中…</div>
    </div>
  </div>
  <script type="module" src="/src/pages/mobile/main.ts"></script>
</body>

</html>
